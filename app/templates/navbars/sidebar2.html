<header class="top-header">
    <div class="container-fluid d-flex align-items-center justify-content-between px-4 py-2">
        <a href="/" class="brand-wrapper">
            <img src="{{ url_for('static', filename='image/crolle.png') }}" class="logo" alt="Logo" height="40">
            <span class="brand-text">P'tit Crolle</span>
        </a>

        <div class="header-actions d-flex align-items-center">
            <button class="btn btn-link nav-link p-2 me-3" id="bd-theme" type="button" onclick="toggleDarkMode()"
                aria-label="Toggle theme">
                <i class="fa-solid fa-moon" id="theme-icon"></i>
            </button>

            {% if current_user.is_authenticated %}
            <a href="/account" class="profile-pill d-flex align-items-center">
                <span class="d-none d-md-inline me-2 fw-semibold"> {{ current_user.username() }} </span>
                <div class="avatar-circle d-flex align-items-center justify-content-center bg-primary text-white rounded-circle"
                    style="width: 35px; height: 35px;">
                    <i class="fa-solid fa-user"></i>
                </div>
            </a>
            {% else %}
            <div class="auth-buttons">
                <a href="/account/login" class="btn btn-outline-primary btn-sm rounded-pill px-3 me-2">Login</a>
                <a href="/account/register" class="btn btn-primary btn-sm rounded-pill px-3">Register</a>
            </div>
            {% endif %}
        </div>
    </div>
</header>

<nav class="main-navigation">
    <div class="nav-links">
        <a href="/3" class="nav-item active" data-bs-toggle="tooltip" data-bs-placement="right" title="Home">
            <i class="fa-solid fa-house"></i>
            <span class="nav-label">Home</span>
        </a>

        <a href="/3" class="nav-item" data-bs-toggle="tooltip" data-bs-placement="right" title="Explore">
            <i class="fa-solid fa-compass"></i>
            <span class="nav-label">Explore</span>
        </a>

        <a href="/3" class="nav-item" data-bs-toggle="tooltip" data-bs-placement="right" title="Favorites">
            <i class="fa-solid fa-heart"></i>
            <span class="nav-label">Saved</span>
        </a>

        {% if current_user.is_authenticated %}
        <a href="/account/logout" class="nav-item logout-item" data-bs-toggle="tooltip" data-bs-placement="right"
            title="Logout">
            <i class="fa-solid fa-power-off"></i>
            <span class="nav-label">Exit</span>
        </a>
        {% endif %}
    </div>
</nav>
